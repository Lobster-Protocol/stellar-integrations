name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # `tsc --noEmit` uses tsconfig.json (loose) and won't catch the
      # composite project errors. We run the actual Vercel-equivalent
      # build (`tsc -b && vite build`) so a failed CI === failed Vercel
      # deploy, period.
      - name: Build (tsc -b + vite build, same as Vercel)
        run: npm run build

      - name: ESLint
        run: npx eslint .
        continue-on-error: true  # recharts formatter callbacks need a few
                                 # `any` casts; keep lint as warnings, not blocking

      - name: Unit tests (Vitest)
        run: npm run test:unit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E (against live deploy)
        run: npx playwright test --reporter=list
        env:
          # tests target https://stellar-instit.lobster-protocol.com
          # they validate the latest pushed code via Vercel auto-deploy
          PLAYWRIGHT_HEADLESS: 'true'
