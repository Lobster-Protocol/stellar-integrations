name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # `tsc --noEmit` uses tsconfig.json (loose) and won't catch the
      # composite project errors. We run the actual Vercel-equivalent
      # build (`tsc -b && vite build`) so a failed CI === failed Vercel
      # deploy, period.
      - name: Build (tsc -b + vite build, same as Vercel)
        run: npm run build

      - name: ESLint
        run: npx eslint .
        continue-on-error: true  # recharts formatter callbacks need a few
                                 # `any` casts; keep lint as warnings, not blocking

      - name: Unit tests (Vitest)
        run: npm run test:unit

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        # no --with-deps: the apt half hung the job on every run since may,
        # and the runner image already ships the chromium libraries
        run: npx playwright install chromium

      # No PLAYWRIGHT_BASE_URL here, so the config serves a local vite build
      # and runs the specs against the code in this commit: they pass on what
      # we just built, not on whatever happens to be live. To smoke a real
      # deploy instead, set
      # PLAYWRIGHT_BASE_URL=https://stellar-instit.lobster-protocol.com.
      - name: Playwright E2E (local build of this commit)
        run: npx playwright test --reporter=list
        env:
          PLAYWRIGHT_HEADLESS: 'true'
