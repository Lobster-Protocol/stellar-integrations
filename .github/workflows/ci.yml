name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      # @stellar-broker/client has a postinstall script that calls yarn.
      # Install yarn before npm ci or the install fails.
      - name: Install yarn (postinstall dep)
        run: npm install -g yarn

      - name: Install dependencies
        run: npm ci

      # `tsc --noEmit` uses tsconfig.json (loose) and won't catch the
      # composite project errors. We run the actual Vercel-equivalent
      # build (`tsc -b && vite build`) so a failed CI === failed Vercel
      # deploy, period.
      - name: Build (tsc -b + vite build, same as Vercel)
        run: npm run build

      - name: ESLint
        run: npx eslint .
        continue-on-error: true  # current code has intentional `any` casts
                                 # for Recharts formatters (cf doc section 9
                                 # AI detection avoidance — keep as warnings)

      - name: Unit tests (Vitest)
        run: npm run test:unit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E (against live deploy)
        run: npx playwright test --reporter=list
        env:
          # tests target https://stellar-integrations-blush.vercel.app
          # they validate the latest pushed code via Vercel auto-deploy
          PLAYWRIGHT_HEADLESS: 'true'
